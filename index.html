<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>This Is Blast</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <!-- Top bar/Header area -->
        <div id="header">
            <div id="level-indicator">LEVEL <span id="level-display">1</span></div>
        </div>

        <!-- The main grid where blocks live -->
        <div id="grid-container">
            <div id="grid"></div>
        </div>

        <!-- Projectile canvas overlay for drawing flying balls and particles -->
        <canvas id="effects-canvas"></canvas>

        <!-- The buckets acting as targets at the bottom -->
        <div id="targets-area">
            <div id="active-targets">
                <!-- 3 Spawns dynamically -->
            </div>
            <div id="queued-targets" class="scrollable-queue">
                <!-- Next targets in line -->
            </div>
        </div>

        <!-- Win/Loss Overlay -->
        <div id="overlay" class="hidden">
            <h1 id="overlay-title">Level Clear!</h1>
            <button id="next-level-btn">Next Level</button>
        </div>

        <div id="game-over-overlay" class="hidden">
            <h1 id="game-over-title">Out of Moves!</h1>
            <button id="restart-btn">Restart Level</button>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        setTimeout(function () {
            var img = document.createElement('img');
            img.src = 'https://cdn.jsdelivr.net/gh/crudeGithub/Open-source-web-games/favicon.svg';
            img.style.position = 'fixed';
            img.style.bottom = '10px';
            img.style.right = '10px';
            img.style.width = '40px';
            img.style.height = '40px';
            img.style.opacity = '0.5';
            img.style.transform = 'rotate(-43deg)';
            img.style.zIndex = '999999';
            img.style.pointerEvents = 'none';
            document.body.appendChild(img);
        }, 10000);
    </script>
</body>

</html>
